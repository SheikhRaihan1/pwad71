<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>

    <style>
         .div{
            display: inline-block;
            height: 50px;
            width: 50px;
            background-color: aqua;
            text-align: center;
         }
         .span{
             text-align: center;
             display: inline-block;
             height: 50px;
             width: 50px;
             background-color: rgba(224, 25, 25, 0.635);
         }
    </style>

</head>
<body>
     <div class="div">Div</div>
     <span class="span">Span</span>

     <span>Lorem, ipsum.</span>
     <span>Lorem, ipsum.</span>
</body>
</html>
