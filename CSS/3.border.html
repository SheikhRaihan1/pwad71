 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
          .div1{
             border-top: 3px dotted red;
             border-bottom: 2px double rgb(49, 205, 129);
             border-left: 10px  rgb(38, 32, 227);
             border-right: 7px solid rgb(212, 237, 22);
             margin: 10px;
      
          }
          .div2{
              border: 20px outset rgba(77, 255, 0, 0.813);
              margin: 10px 12px 15px;
              padding: 10px;
          }

          .btn{
             border: none;
             padding: 10px 20px;
             font-size: 16px;
             background-color: rgb(248, 159, 43);
             border-radius: 5px 15px 5px 15px;
             color: #fff;
             cursor: pointer;
          }

          .btn:hover{
            background-color: rgb(190, 121, 31);
          }
         
    </style>
 </head>
 <body>
     <button class="btn">Click</button>


    <div class="div1">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Excepturi,</div>
    <div class="div2">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Excepturi,</div>
 </body>
 </html>
