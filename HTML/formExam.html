<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Form Practice</title>
</head>
<body>

    <h2>Student Registration Form</h2>

    <form>

        <!-- Text Input -->
        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your name"><br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <!-- Password -->
        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <!-- Number -->
        <label>Age:</label><br>
        <input type="number" name="age"><br><br>

        <!-- Date -->
        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <!-- Radio Button -->
        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other<br><br>

        <!-- Checkbox -->
        <label>Skills:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript<br><br>

        <!-- Dropdown -->
        <label>Country:</label><br>
        <select>
            <option>Bangladesh</option>
            <option>India</option>
            <option>USA</option>
        </select><br><br>

        <!-- Textarea -->
        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <!-- File Upload -->
        <label>Upload CV:</label><br>
        <input type="file"><br><br>

        <!-- Color -->
        <label>Favorite Color:</label><br>
        <input type="color"><br><br>

        <!-- Range -->
        <label>Experience (0-10):</label><br>
        <input type="range" min="0" max="10"><br><br>

        <!-- Submit & Reset -->
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
