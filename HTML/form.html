<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Elements</title>
</head>
<body>
    <h1>Student Data Collection</h1>
   <form action="index.php" method="post"  enctype="multipart/form-data">

    <label for="student_id">Student ID:</label>
    <input name="student_id" id="student_id" type="text"  required />
     
    <br/>
    <br/>
    
    <label for="name">Name: </label>
    <input name="name" type="text" id="name" required>

    <br/>
    <br/>

    <label for="email">Email:</label>
    <input name="email" type="email" id="email" placeholder="rajib@gmail.com" required>

    <br/>
    <br/>

    <label for="phone">Phone</label>
    <input name="phone" type="tel" placeholder="+88-045-684" >

    <br/>
    <br/>

    <label for="class">Class</label>
     <select name="class"  id="class" required>
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
        <option value="MBA">MBA</option>
        <option value="BBA">BBA</option>
     </select>

    <br/>
    <br/>
    
    <label for="subject">Subject</label>
     
     <input type="checkbox" value="English" name="subject">English
     <input type="checkbox" value="Physics" name="subject">Physics
     <input type="checkbox" value="Math" name="subject">Math
     <input type="checkbox" value="Chemitry" name="subject">Chemitry
    <br/>
    <br/>

      <label for="gender">Gender</label>
      <label for="male"> <input id="male" type="radio" value="Male" name="gender">Male</label>
      <label for="female"> <input id="female" type="radio" value="Female" name="gender">Female</label>
    
      <br/>
      <br/>

       <label for="img">Upload Image</label>
       <input name="img" type="file" id="img">

        <br/>
        <br/>

       <label for="dob">Date Of Birth</label>
       <input name="dob" type="date" id="dob">

        <br/>
        <br/>

      <label for="address">Address</label>
      <textarea name="address" id="address"  rows="5"  cols="20" ></textarea>

    <br/>
    <br/>
    <input type="submit"> 
    <input type="reset">

    
   </form>

</html>
